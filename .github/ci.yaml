on:
 push:
  branches: [main]
  paths:
   - 'app/**'

jobs:
 build-and-push:
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
     
   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3
   
   - name: Login to Docker Hub
     uses: docker/login-action@v3
     with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}
   
   - name: Extract Short SHA
     id: sha
     run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

   - name: Build and Push
     uses: docker/build-push-action@v5
     with:
      context: ./app
      push: true
      tags: |
       ${{ secrets.DOCKERHUB_USERNAME }}/kubeguin:latest
       ${{ secrets.DOCKERHUB_USERNAME }}/kubeguin:${{ steps.sha.outputs.short }}
 
 update-manifest:
  needs: build-and-push
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Extract Short SHA
     id: sha
     run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

   - name: Update deployment image tag
     run: |
      sed -i "s|image: .*/kubeguin:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/kubeguin:${{ steps.sha.outputs.short }}|" k8s/deployment.yaml
  
   - name: Commit and Push Updated Manifests
     run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git add k8s/deployment.yaml
      git diff --staged --quiet || git commit -m "ci: update image tag to ${{ steps.sha.outputs.short }}"
      git push
