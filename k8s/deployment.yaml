apiVersion: apps/v1
kind: Deployment
metadata:
 name: kubeguin
 labels:
  app: kubeguin
spec:
 replicas: 2
 selector:
  matchLabels:
   app: kubeguin
 template:
  metadata:
   labels:
    app: kubeguin
  spec:
   containers:
    - name: kubeguin
      image: aron4226/kubeguin:latest
      ports:
       - containerPort: 5000
      env:
       - name: APP_VERSION
         value: "1.0.0"
      resources:
       requests:
        memory: "64Mi"
        cpu: "100m"
       limits:
        memory: "128Mi"
        cpu: "200m"
      readinessProbe:
       httpGet:
        path: /health
        port: 5000
       initialDelaySeconds: 5
       periodSeconds: 10
      livenessProbe:
       httpGet:
        path: /health
        port: 5000
       initialDelaySeconds: 10
       periodSeconds: 30